<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira Admin Panel | لوحة التحكم</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --primary-gold: #c5a059;
            --matte-gold: #a68b5a;
            --text-white: #e0e0e0;
            --text-dim: #a0a0a0;
            --error-red: #ff5252;
            --success-green: #4caf50;
            --input-border: #333;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Login Screen --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }

        .login-box img {
            width: 80px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .login-box h1 {
            font-family: 'Amiri', serif;
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--primary-gold);
        }

        .login-box input {
            width: 100%;
            padding: 12px 15px;
            background: #252525;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: var(--transition);
        }

        .login-box input:focus {
            border-color: var(--primary-gold);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--primary-gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-box button:hover {
            background: var(--matte-gold);
            transform: translateY(-2px);
        }

        #login-error {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* --- Dashboard --- */
        #dashboard {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h2 {
            font-family: 'Amiri', serif;
            font-size: 32px;
            color: var(--primary-gold);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-primary { background: var(--primary-gold); color: #000; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-danger { background: var(--error-red); color: #fff; }
        .btn-success { background: var(--success-green); color: #fff; }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- Form Section --- */
        .admin-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .admin-section h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group input:focus { border-color: var(--primary-gold); }

        /* --- Image Editor --- */
        #prod-preview-container {
            width: 100%;
            display: none;
            margin-top: 15px;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .image-editor-preview {
            width: 100%;
            max-width: 280px; /* ~2:3 aspect ratio */
            height: 420px;
            margin: 0 auto 15px auto;
            border: 2px dashed #555;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background: #111;
        }
        .image-editor-preview:active {
            cursor: grabbing;
        }

        .image-editor-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* Let the container handle drag */
            transform-origin: center;
        }

        .editor-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            width: 80px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .control-group input[type="range"] {
            flex: 1;
            accent-color: var(--primary-gold);
        }

        .control-group span {
            width: 40px;
            font-size: 12px;
            text-align: right;
        }

        .reset-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            transition: var(--transition);
        }

        .reset-btn:hover {
            background: #555;
        }

        /* --- Product Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-gold);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #333;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .product-price {
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-sizes {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
        }

        .btn-sm { padding: 8px 12px; font-size: 14px; flex: 1; justify-content: center; }

        /* Notification */
        #notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-title h2 { font-size: 24px; }
            .form-grid { grid-template-columns: 1fr; }
            .header-actions { flex-direction: column; width: 100%; gap: 10px; }
            .btn { width: 100%; justify-content: center; }
        }

        [hidden] { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Login Section -->
    <div id="login-screen">
        <div class="login-box">
            <img src="Images/logo.jpg" alt="Hira Logo">
            <h1>لوحة تحكم حيرة</h1>
            <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور" autofocus>
            <button onclick="checkPassword()">دخول</button>
            <p id="login-error">كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard">
        <header>
            <div class="header-title">
                <img src="Images/logo.jpg" alt="Logo" style="width: 50px; border-radius: 5px;">
                <h2>لوحة التحكم | Hira</h2>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportData()"><i class="fa fa-copy"></i> نسخ data.js</button>
                <button class="btn btn-danger" onclick="logout()"><i class="fa fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>

        <!-- Product Form -->
        <section class="admin-section">
            <h3 id="form-title"><i class="fa fa-plus-circle"></i> إضافة منتج جديد</h3>
            <form id="product-form">
                <input type="hidden" id="edit-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>كود المنتج (ID)</label>
                        <input type="text" id="prod-id" placeholder="مثال: 1" required>
                    </div>
                    <div class="form-group">
                        <label>اسم المنتج</label>
                        <input type="text" id="prod-name" placeholder="مثال: عباية طرابية" required>
                    </div>
                    <div class="form-group">
                        <label>السعر</label>
                        <input type="text" id="prod-price" placeholder="مثال: 45000" required>
                    </div>
                    <div class="form-group">
                        <label>اسم ملف الصورة</label>
                        <input type="text" id="prod-image-name" placeholder="مثال: 1.jpg" required oninput="updatePreviewLocal()">
                        <div id="prod-preview-container">
                            <h4 style="margin-bottom: 10px; font-size: 14px; color: var(--primary-gold);"><i class="fa fa-crop-alt"></i> محرر الصورة</h4>
                            <div class="image-editor-preview" id="image-editor-preview">
                                <img src="" id="prod-preview">
                            </div>
                            <div class="editor-controls">
                                <div class="control-group">
                                    <label>تكبير (Zoom)</label>
                                    <input type="range" id="editor-zoom" min="1" max="3" step="0.1" value="1">
                                    <span id="editor-zoom-val">1x</span>
                                </div>
                                <div class="control-group">
                                    <label>موضع أفقي (X)</label>
                                    <input type="range" id="editor-x" min="0" max="100" step="1" value="50">
                                    <span id="editor-x-val">50%</span>
                                </div>
                                <div class="control-group">
                                    <label>موضع عمودي (Y)</label>
                                    <input type="range" id="editor-y" min="0" max="100" step="1" value="50">
                                    <span id="editor-y-val">50%</span>
                                </div>
                                <button type="button" class="reset-btn" onclick="resetEditor()">إعادة ضبط</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>المقاسات (فواصل بينها)</label>
                        <input type="text" id="prod-sizes" placeholder="مثال: S, M, L, XL" required>
                    </div>
                    <div class="form-group">
                        <label>الوصف (اختياري)</label>
                        <textarea id="prod-desc" placeholder="وصف المنتج هنا..."></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="save-btn"><i class="fa fa-save"></i> حفظ المنتج</button>
                    <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none;" onclick="resetForm()">إلغاء</button>
                </div>
            </form>
        </section>

        <!-- Product List -->
        <section>
            <h3><i class="fa fa-box"></i> المنتجات الحالية (<span id="count">0</span>)</h3>
            <br>
            <div id="product-list" class="product-grid">
                <!-- Products will be injected here -->
            </div>
        </section>
    </div>

    <!-- Notification toast -->
    <div id="notification"></div>

    <script>
        const ADMIN_PASSWORD = "200211";
        let products = [];
        let isEditing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            
            // Password input enter key
            document.getElementById('admin-pass').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkPassword();
            });

            // Form Submit
            document.getElementById('product-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveProduct();
            });


            // Prevent basic console/F12 actions
            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            }
        });

        // --- Auth Logic ---
        function checkPassword() {
            const pass = document.getElementById('admin-pass').value.trim();
            const error = document.getElementById('login-error');
            
            console.log("Attempting login with password..."); // Debug log

            if (pass === ADMIN_PASSWORD) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    notify("تم تسجيل الدخول بنجاح", "success");
                }, 500);
            } else {
                error.style.display = 'block';
                document.getElementById('admin-pass').value = '';
                document.getElementById('admin-pass').focus();
            }
        }

        function logout() {
            location.reload();
        }

        // --- Data Logic ---
        function loadProducts() {
            const stored = localStorage.getItem('hira_products');
            if (stored) {
                products = JSON.parse(stored);
            } else {
                // Initial load from data.js if it exists in window context 
                // but since we are frontend only and data.js might not be loaded here
                // we'll start empty or the user can manual paste/import.
                // However, the prompt says "start with empty array" if localStorage is empty.
                products = [];
            }
            renderProducts();
        }

        function saveToStorage() {
            localStorage.setItem('hira_products', JSON.stringify(products));
            document.getElementById('count').textContent = products.length;
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            document.getElementById('count').textContent = products.length;

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                // Safety check for sizes array
                const sizesList = (p.sizes && Array.isArray(p.sizes)) ? p.sizes.join(', ') : 'غير محدد';
                
                card.innerHTML = `
                    <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${Number(p.price).toLocaleString()} د.ع</div>
                        <div class="product-sizes">المقاسات: ${sizesList}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editProduct('${p.id}')"><i class="fa fa-edit"></i> تعديل</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')"><i class="fa fa-trash"></i> حذف</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function saveProduct() {
            const idInput = document.getElementById('prod-id').value;
            const name = document.getElementById('prod-name').value;
            const priceInput = document.getElementById('prod-price').value;
            const imgName = document.getElementById('prod-image-name').value;
            const sizesStr = document.getElementById('prod-sizes').value;
            const desc = document.getElementById('prod-desc').value;

            // Consistency Check: String values and Image path
            const productData = {
                id: String(idInput),
                name: name,
                price: String(priceInput),
                image: "Images/" + imgName.replace("Images/", "").replace("images/", ""),
                sizes: sizesStr.split(',').map(s => s.trim()).filter(s => s !== ""),
                description: desc,
                imagePositionX: editorState.x,
                imagePositionY: editorState.y,
                imageScale: editorState.zoom
            };

            if (isEditing) {
                const index = products.findIndex(p => p.id === document.getElementById('edit-id').value);
                if (index !== -1) products[index] = productData;
                notify("تم تحديث المنتج بنجاح", "success");
            } else {
                if(products.find(p => p.id === productData.id)) {
                    notify("كود المنتج موجود مسبقاً!", "error");
                    return;
                }
                products.push(productData);
                notify("تم إضافة المنتج بنجاح", "success");
            }

            saveToStorage();
            renderProducts();
            resetForm();
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (!p) return;

            document.getElementById('prod-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-price').value = p.price;
            
            // Just get the filename from Images/1.jpg
            const fileName = p.image.split('/').pop();
            document.getElementById('prod-image-name').value = fileName;
            
            // Set Editor State
            editorState.x = p.imagePositionX !== undefined ? p.imagePositionX : 50;
            editorState.y = p.imagePositionY !== undefined ? p.imagePositionY : 50;
            editorState.zoom = p.imageScale !== undefined ? p.imageScale : 1;
            applyEditorState();
            
            updatePreviewLocal();

            document.getElementById('prod-sizes').value = p.sizes.join(', ');
            document.getElementById('prod-desc').value = p.description || "";
            
            document.getElementById('edit-id').value = p.id;
            document.getElementById('form-title').innerHTML = '<i class="fa fa-edit"></i> تعديل المنتج';
            document.getElementById('save-btn').innerHTML = '<i class="fa fa-check"></i> تحديث التغييرات';
            document.getElementById('cancel-btn').style.display = 'block';
            
            isEditing = true;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updatePreviewLocal() {
            const val = document.getElementById('prod-image-name').value;
            const preview = document.getElementById('prod-preview');
            const container = document.getElementById('prod-preview-container');
            if(val) {
                preview.src = "Images/" + val.replace("Images/", "").replace("images/", "");
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }


        function deleteProduct(id) {
            if (confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                products = products.filter(p => p.id !== id);
                saveToStorage();
                renderProducts();
                notify("تم حذف المنتج", "success");
            }
        }

        function resetForm() {
            document.getElementById('product-form').reset();
            document.getElementById('prod-preview-container').style.display = 'none';
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerHTML = '<i class="fa fa-plus-circle"></i> إضافة منتج جديد';
            document.getElementById('save-btn').innerHTML = '<i class="fa fa-save"></i> حفظ المنتج';
            document.getElementById('cancel-btn').style.display = 'none';
            isEditing = false;
        }

        function exportData() {
            const dataString = `const hiraProducts = ${JSON.stringify(products, null, 4)};`;
            navigator.clipboard.writeText(dataString).then(() => {
                notify("تم نسخ البيانات لملف data.js بنجاح", "success");
            }).catch(err => {
                console.error("Copy failed", err);
                notify("فشل النسخ تلقائياً", "error");
            });
        }

        function notify(msg, type) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.display = 'block';
            n.style.background = type === 'success' ? 'var(--success-green)' : 'var(--error-red)';
            
            setTimeout(() => {
                n.style.display = 'none';
            }, 3000);
        }

        // --- Image Editor Logic ---
        let editorState = { x: 50, y: 50, zoom: 1 };
        let isDragging = false;
        let startPos = { x: 0, y: 0 };

        const previewContainer = document.getElementById('image-editor-preview');
        const previewImg = document.getElementById('prod-preview');
        const zoomSlider = document.getElementById('editor-zoom');
        const xSlider = document.getElementById('editor-x');
        const ySlider = document.getElementById('editor-y');

        function applyEditorState() {
            previewImg.style.objectPosition = `${editorState.x}% ${editorState.y}%`;
            previewImg.style.transform = `scale(${editorState.zoom})`;
            
            document.getElementById('editor-zoom-val').textContent = editorState.zoom + 'x';
            document.getElementById('editor-x-val').textContent = editorState.x + '%';
            document.getElementById('editor-y-val').textContent = editorState.y + '%';
            
            zoomSlider.value = editorState.zoom;
            xSlider.value = editorState.x;
            ySlider.value = editorState.y;
        }

        zoomSlider.addEventListener('input', (e) => {
            editorState.zoom = parseFloat(e.target.value);
            applyEditorState();
        });
        xSlider.addEventListener('input', (e) => {
            editorState.x = parseInt(e.target.value);
            applyEditorState();
        });
        ySlider.addEventListener('input', (e) => {
            editorState.y = parseInt(e.target.value);
            applyEditorState();
        });

        // Drag functionality
        previewContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startPos = { x: e.clientX, y: e.clientY };
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const dx = e.clientX - startPos.x;
            const dy = e.clientY - startPos.y;
            
            const sensitivityX = 0.2 / editorState.zoom;
            const sensitivityY = 0.2 / editorState.zoom;
            
            editorState.x = Math.max(0, Math.min(100, editorState.x - (dx * sensitivityX)));
            editorState.y = Math.max(0, Math.min(100, editorState.y - (dy * sensitivityY)));
            
            startPos = { x: e.clientX, y: e.clientY };
            applyEditorState();
        });
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch support for drag
        previewContainer.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                isDragging = true;
                startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, {passive: true});
        document.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length === 0) return;
            
            const dx = e.touches[0].clientX - startPos.x;
            const dy = e.touches[0].clientY - startPos.y;
            
            const sensitivityX = 0.2 / editorState.zoom;
            const sensitivityY = 0.2 / editorState.zoom;
            
            editorState.x = Math.max(0, Math.min(100, editorState.x - (dx * sensitivityX)));
            editorState.y = Math.max(0, Math.min(100, editorState.y - (dy * sensitivityY)));
            
            startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            applyEditorState();
        }, {passive: true});
        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        function resetEditor() {
            editorState = { x: 50, y: 50, zoom: 1 };
            applyEditorState();
        }
    </script>
</body>
</html>
