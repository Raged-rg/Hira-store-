<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira Admin Panel | لوحة التحكم</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/5gZd96b3/logo.jpg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --primary-gold: #c5a059;
            --matte-gold: #a68b5a;
            --text-white: #e0e0e0;
            --text-dim: #a0a0a0;
            --error-red: #ff5252;
            --success-green: #4caf50;
            --input-border: #333;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --card-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Login Screen --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }

        .login-box img {
            width: 80px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .login-box h1 {
            font-family: 'Amiri', serif;
            font-size: 28px;
            margin-bottom: 30px;
            color: #D6C2A8;
        }

        .login-box input {
            width: 100%;
            padding: 12px 15px;
            background: #252525;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: var(--transition);
        }

        .login-box input:focus {
            border-color: var(--primary-gold);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: var(--matte-gold);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            position: relative;
            z-index: 10;
            pointer-events: auto;
        }

        .login-box button:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .login-box { padding: 30px 20px; width: 90%; }
            .login-box h1 { font-size: 22px; }
        }

        .login-box button:hover {
            background: var(--matte-gold);
            transform: translateY(-2px);
        }

        #login-error {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* --- Dashboard --- */
        #dashboard {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h2 {
            font-family: 'Amiri', serif;
            font-size: 32px;
            color: #D6C2A8;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            min-height: 48px; /* Mobile touch target */
            pointer-events: auto !important;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary { background: var(--primary-gold); color: #000; z-index: 5; }
        .btn-secondary { background: #333; color: #fff; z-index: 5; }
        .btn-danger { background: var(--error-red); color: #fff; z-index: 5; }
        .btn-success { background: var(--success-green); color: #fff; z-index: 5; }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- Form Section --- */
        .admin-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .admin-section h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group input:focus { border-color: var(--primary-gold); }

        /* --- Image Editor --- */
        #prod-preview-container {
            width: 100%;
            display: none;
            margin-top: 15px;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .image-editor-preview {
            width: 100%;
            max-width: 280px; /* ~2:3 aspect ratio */
            height: 420px;
            margin: 0 auto 15px auto;
            border: 2px dashed #555;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background: #111;
        }
        .image-editor-preview:active {
            cursor: grabbing;
        }

        .image-editor-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* Let the container handle drag */
            transform-origin: center;
        }

        .editor-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            width: 80px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .control-group input[type="range"] {
            flex: 1;
            accent-color: var(--primary-gold);
        }

        .control-group span {
            width: 40px;
            font-size: 12px;
            text-align: right;
        }

        .reset-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            transition: var(--transition);
        }

        .reset-btn:hover {
            background: #555;
        }

        /* --- Product Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-gold);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #333;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .product-price {
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-sizes {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            pointer-events: auto;
        }

        .btn-sm { 
            padding: 10px 16px; 
            font-size: 14px; 
            flex: 1; 
            justify-content: center; 
            min-height: 44px; /* Requirement: 44px height */
        }

        /* Notification */
        #notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-title h2 { font-size: 24px; }
            .form-grid { grid-template-columns: 1fr; }
            .header-actions { flex-direction: column; width: 100%; gap: 10px; }
            .btn { width: 100%; justify-content: center; }
        }

        [hidden] { display: none !important; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-screen">
        <div class="login-box">
            <img src="https://i.ibb.co/5gZd96b3/logo.jpg" alt="Hira Logo">
            <h1>لوحة تحكم حــــيرة</h1>
            <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور" autofocus>
            <button onclick="checkPassword()">دخول</button>
            <p id="login-error">كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard">
        <header>
            <div class="header-title">
                <img src="https://i.ibb.co/5gZd96b3/logo.jpg" alt="Logo" style="width: 50px; border-radius: 5px;">
                <h2>لوحة التحكم | Hira</h2>
            </div>
            <div class="header-actions">
                <button class="btn btn-danger" onclick="logout()"><i class="fa fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>

        <!-- Product Form -->
        <section class="admin-section">
            <h3 id="form-title"><i class="fa fa-plus-circle"></i> إضافة منتج جديد</h3>
            <form id="product-form">
                <input type="hidden" id="edit-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>كود المنتج (ID)</label>
                        <input type="text" id="prod-id" placeholder="مثال: 1" required>
                    </div>
                    <div class="form-group">
                        <label>اسم المنتج</label>
                        <input type="text" id="prod-name" placeholder="مثال: عباية طرابية" required>
                    </div>
                    <div class="form-group">
                        <label>السعر</label>
                        <input type="text" id="prod-price" placeholder="مثال: 45000" required>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>صور المنتج (4 صور منفصلة) <span id="uploading-text" style="color:var(--primary-gold); display:none;">(جاري الرفع...)</span></label>
                        <div class="image-upload-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 10px;">
                            <div class="image-upload-card" style="border: 2px dashed var(--input-border); border-radius: 12px; padding: 15px; text-align: center; position: relative; background: var(--bg-card);">
                                <label style="font-weight: bold; margin-bottom: 10px; display: block; color: var(--text-dim);">صورة 1 (الرئيسية)</label>
                                <input type="file" id="prod-image-1" accept="image/*" style="display:none;" onchange="updatePreviewLocal(1)">
                                <label for="prod-image-1" class="upload-btn" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; background: var(--bg-dark); border: 1px solid var(--input-border); border-radius: 8px; transition: 0.3s;">
                                    <i class="fa fa-camera" style="font-size: 24px; color: var(--text-dim); margin-bottom: 5px;"></i>
                                    <span style="font-size: 14px; color: var(--text-dim);">اضغط لرفع الصورة</span>
                                </label>
                                <div id="preview-container-1" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--input-border);">
                                    <img id="prod-preview-1" src="" style="width: 100%; height: 100%; object-fit: cover;">
                                    <button type="button" onclick="document.getElementById('prod-image-1').click()" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;"><i class="fa fa-edit"></i> تغيير</button>
                                </div>
                            </div>
                            <div class="image-upload-card" style="border: 2px dashed var(--input-border); border-radius: 12px; padding: 15px; text-align: center; position: relative; background: var(--bg-card);">
                                <label style="font-weight: bold; margin-bottom: 10px; display: block; color: var(--text-dim);">صورة 2</label>
                                <input type="file" id="prod-image-2" accept="image/*" style="display:none;" onchange="updatePreviewLocal(2)">
                                <label for="prod-image-2" class="upload-btn" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; background: var(--bg-dark); border: 1px solid var(--input-border); border-radius: 8px; transition: 0.3s;">
                                    <i class="fa fa-camera" style="font-size: 24px; color: var(--text-dim); margin-bottom: 5px;"></i>
                                    <span style="font-size: 14px; color: var(--text-dim);">اضغط لرفع الصورة</span>
                                </label>
                                <div id="preview-container-2" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--input-border);">
                                    <img id="prod-preview-2" src="" style="width: 100%; height: 100%; object-fit: cover;">
                                    <button type="button" onclick="document.getElementById('prod-image-2').click()" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;"><i class="fa fa-edit"></i> تغيير</button>
                                </div>
                            </div>
                            <div class="image-upload-card" style="border: 2px dashed var(--input-border); border-radius: 12px; padding: 15px; text-align: center; position: relative; background: var(--bg-card);">
                                <label style="font-weight: bold; margin-bottom: 10px; display: block; color: var(--text-dim);">صورة 3</label>
                                <input type="file" id="prod-image-3" accept="image/*" style="display:none;" onchange="updatePreviewLocal(3)">
                                <label for="prod-image-3" class="upload-btn" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; background: var(--bg-dark); border: 1px solid var(--input-border); border-radius: 8px; transition: 0.3s;">
                                    <i class="fa fa-camera" style="font-size: 24px; color: var(--text-dim); margin-bottom: 5px;"></i>
                                    <span style="font-size: 14px; color: var(--text-dim);">اضغط لرفع الصورة</span>
                                </label>
                                <div id="preview-container-3" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--input-border);">
                                    <img id="prod-preview-3" src="" style="width: 100%; height: 100%; object-fit: cover;">
                                    <button type="button" onclick="document.getElementById('prod-image-3').click()" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;"><i class="fa fa-edit"></i> تغيير</button>
                                </div>
                            </div>
                            <div class="image-upload-card" style="border: 2px dashed var(--input-border); border-radius: 12px; padding: 15px; text-align: center; position: relative; background: var(--bg-card);">
                                <label style="font-weight: bold; margin-bottom: 10px; display: block; color: var(--text-dim);">صورة 4</label>
                                <input type="file" id="prod-image-4" accept="image/*" style="display:none;" onchange="updatePreviewLocal(4)">
                                <label for="prod-image-4" class="upload-btn" style="cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 150px; background: var(--bg-dark); border: 1px solid var(--input-border); border-radius: 8px; transition: 0.3s;">
                                    <i class="fa fa-camera" style="font-size: 24px; color: var(--text-dim); margin-bottom: 5px;"></i>
                                    <span style="font-size: 14px; color: var(--text-dim);">اضغط لرفع الصورة</span>
                                </label>
                                <div id="preview-container-4" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--input-border);">
                                    <img id="prod-preview-4" src="" style="width: 100%; height: 100%; object-fit: cover;">
                                    <button type="button" onclick="document.getElementById('prod-image-4').click()" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;"><i class="fa fa-edit"></i> تغيير</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>المقاسات (فواصل بينها)</label>
                        <input type="text" id="prod-sizes" placeholder="مثال: S, M, L, XL" required>
                    </div>
                    <div class="form-group">
                        <label>الوصف (اختياري)</label>
                        <textarea id="prod-desc" placeholder="وصف المنتج هنا..."></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="save-btn"><i class="fa fa-save"></i> حفظ المنتج</button>
                    <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none;" onclick="resetForm()">إلغاء</button>
                </div>
            </form>
        </section>

        <!-- Product List -->
        <section>
            <h3><i class="fa fa-box"></i> المنتجات الحالية (<span id="count">0</span>)</h3>
            <br>
            <div id="product-list" class="product-grid">
                <!-- Products will be injected here -->
            </div>
        </section>
    </div>

    <!-- Notification toast -->
    <div id="notification"></div>

    <script type="module">
        import { db, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from './firebase-config.js';
        
        const ADMIN_PASSWORD = "200211";
        const IMGBB_API_KEY = "e1044b5a078264d9e90d27e1f943a8e4";
        let products = [];
        let isEditing = false;

        // Expose functions to window because this is a module
        window.checkPassword = checkPassword;
        window.logout = logout;
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.resetForm = resetForm;
        window.updatePreviewLocal = updatePreviewLocal;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check session
            if (localStorage.getItem('hira_admin_session') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('login-screen').style.pointerEvents = 'none';
                document.getElementById('dashboard').style.display = 'block';
            }

            loadProducts();
            
            // Password input enter key
            document.getElementById('admin-pass').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkPassword();
            });

            // Form Submit
            document.getElementById('product-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveProduct();
            });
        });

        // --- Auth Logic ---
        function checkPassword() {
            const pass = document.getElementById('admin-pass').value.trim();
            const error = document.getElementById('login-error');
            
            console.log("Attempting login with password..."); // Debug log

            if (pass === ADMIN_PASSWORD) {
                localStorage.setItem('hira_admin_session', 'true');
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('login-screen').style.pointerEvents = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    notify("تم تسجيل الدخول بنجاح", "success");
                }, 500);
            } else {
                error.style.display = 'block';
                document.getElementById('admin-pass').value = '';
                document.getElementById('admin-pass').focus();
            }
        }

        function logout() {
            localStorage.removeItem('hira_admin_session');
            location.reload();
        }

        // --- Data Logic ---
        async function loadProducts() {
            products = [];
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                querySnapshot.forEach((document) => {
                    products.push({ _docId: document.id, ...document.data() });
                });
            } catch (e) {
                console.error("Error loading products: ", e);
            }
            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            document.getElementById('count').textContent = products.length;

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                // Safety check for sizes array
                const sizesList = (p.sizes && Array.isArray(p.sizes)) ? p.sizes.join(', ') : 'غير محدد';
                
                card.innerHTML = `
                    <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${Number(p.price).toLocaleString()} د.ع</div>
                        <div class="product-sizes">المقاسات: ${sizesList}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editProduct('${p._docId}')"><i class="fa fa-edit"></i> تعديل</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p._docId}')"><i class="fa fa-trash"></i> حذف</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function saveProduct() {
            const idInput = document.getElementById('prod-id').value;
            const name = document.getElementById('prod-name').value;
            const priceInput = document.getElementById('prod-price').value;
            const sizesStr = document.getElementById('prod-sizes').value;
            const desc = document.getElementById('prod-desc').value;

            const saveBtn = document.getElementById('save-btn');
            const uploadingText = document.getElementById('uploading-text');

            saveBtn.disabled = true;
            uploadingText.style.display = 'inline';

            let uploadedImages = { 1: "", 2: "", 3: "", 4: "" };
            let hasAtLeastOneImage = false;

            // Upload 4 images sequentially or in parallel
            let uploadPromises = [1, 2, 3, 4].map(async (i) => {
                const fileInput = document.getElementById(`prod-image-${i}`);
                if (fileInput.files && fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append("image", fileInput.files[0]);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const data = await response.json();
                    if(data.success) {
                        uploadedImages[i] = data.data.url;
                        hasAtLeastOneImage = true;
                    } else {
                        throw new Error("Upload failed");
                    }
                } else if (isEditing) {
                    const p = products.find(prod => prod._docId === document.getElementById('edit-id').value);
                    if (p[`image${i}`]) {
                        uploadedImages[i] = p[`image${i}`];
                        hasAtLeastOneImage = true;
                    } else if (i === 1 && p.image) {
                        // Fallback for old data structure
                        uploadedImages[i] = p.image;
                        hasAtLeastOneImage = true;
                    } else if (p.images && p.images[i-1]) {
                         uploadedImages[i] = p.images[i-1];
                         hasAtLeastOneImage = true;
                    }
                }
            });

            try {
                await Promise.all(uploadPromises);
            } catch (e) {
                notify("خطأ في الاتصال بخادم الصور", "error");
                saveBtn.disabled = false;
                uploadingText.style.display = 'none';
                return;
            }

            if (!hasAtLeastOneImage) {
                notify("يجب اختيار صورة واحدة على الأقل", "error");
                saveBtn.disabled = false;
                uploadingText.style.display = 'none';
                return;
            }

            const productData = {
                id: String(idInput),
                name: name,
                price: String(priceInput),
                image1: uploadedImages[1],
                image2: uploadedImages[2],
                image3: uploadedImages[3],
                image4: uploadedImages[4],
                sizes: sizesStr.split(',').map(s => s.trim()).filter(s => s !== ""),
                description: desc,
                createdAt: new Date().toISOString()
            };

            try {
                if (isEditing) {
                    const editId = document.getElementById('edit-id').value;
                    await updateDoc(doc(db, "products", editId), productData);
                    notify("تم تحديث المنتج بنجاح", "success");
                } else {
                    if(products.find(p => p.id === productData.id)) {
                        notify("كود المنتج (ID) موجود مسبقاً!", "error");
                        saveBtn.disabled = false;
                        uploadingText.style.display = 'none';
                        return;
                    }
                    await addDoc(collection(db, "products"), productData);
                    notify("تم إضافة المنتج بنجاح", "success");
                }
            } catch (e) {
                notify("فشل الحفظ في قاعدة البيانات", "error");
                console.error(e);
            }

            saveBtn.disabled = false;
            uploadingText.style.display = 'none';
            await loadProducts();
            resetForm();
        }

        function editProduct(docId) {
            const p = products.find(prod => prod._docId === docId);
            if (!p) return;

            document.getElementById('prod-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-price').value = p.price;
            
            // Populate images
            for(let i=1; i<=4; i++) {
                document.getElementById(`prod-image-${i}`).value = ""; // clear file input
                let imgUrl = p[`image${i}`] || (p.images && p.images[i-1]);
                if (i === 1 && !imgUrl) imgUrl = p.image;
                
                if (imgUrl) {
                    document.getElementById(`prod-preview-${i}`).src = imgUrl;
                    document.getElementById(`preview-container-${i}`).style.display = 'block';
                } else {
                    document.getElementById(`preview-container-${i}`).style.display = 'none';
                }
            }
            
            document.getElementById('edit-id').value = p._docId;
            isEditing = true;
            
            document.getElementById('prod-sizes').value = (p.sizes || []).join(', ');
            document.getElementById('prod-desc').value = p.description || "";
            
            document.getElementById('form-title').innerHTML = '<i class="fa fa-edit"></i> تعديل المنتج';
            document.getElementById('save-btn').innerHTML = '<i class="fa fa-check"></i> تحديث التغييرات';
            document.getElementById('cancel-btn').style.display = 'block';
            
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updatePreviewLocal(i) {
            if (i === undefined) return; // for old calls if any
            const fileInput = document.getElementById(`prod-image-${i}`);
            const preview = document.getElementById(`prod-preview-${i}`);
            const container = document.getElementById(`preview-container-${i}`);
            
            if(fileInput && fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    container.style.display = 'block';
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else if (container) {
                container.style.display = 'none';
            }
        }

        async function deleteProduct(docId) {
            if (confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                try {
                    await deleteDoc(doc(db, "products", docId));
                    notify("تم حذف المنتج", "success");
                    await loadProducts();
                } catch(e) {
                    notify("فشل الحذف", "error");
                    console.error(e);
                }
            }
        }

        function resetForm() {
            document.getElementById('product-form').reset();
            for(let i=1; i<=4; i++) {
                const imgInput = document.getElementById(`prod-image-${i}`);
                const container = document.getElementById(`preview-container-${i}`);
                if (imgInput) imgInput.value = "";
                if (container) container.style.display = 'none';
            }
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerHTML = '<i class="fa fa-plus-circle"></i> إضافة منتج جديد';
            document.getElementById('save-btn').innerHTML = '<i class="fa fa-save"></i> حفظ المنتج';
            document.getElementById('cancel-btn').style.display = 'none';
            isEditing = false;
        }

        function notify(msg, type) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.display = 'block';
            n.style.background = type === 'success' ? 'var(--success-green)' : 'var(--error-red)';
            
            setTimeout(() => {
                n.style.display = 'none';
            }, 3000);
        }

        // --- Image Editor Logic ---
        let editorState = { x: 50, y: 50, zoom: 1 };
        let isDragging = false;
        let startPos = { x: 0, y: 0 };

        const previewContainer = document.getElementById('image-editor-preview');
        const previewImg = document.getElementById('prod-preview');
        const zoomSlider = document.getElementById('editor-zoom');
        const xSlider = document.getElementById('editor-x');
        const ySlider = document.getElementById('editor-y');

        function applyEditorState() {
            previewImg.style.objectPosition = `${editorState.x}% ${editorState.y}%`;
            previewImg.style.transform = `scale(${editorState.zoom})`;
            
            document.getElementById('editor-zoom-val').textContent = editorState.zoom + 'x';
            document.getElementById('editor-x-val').textContent = editorState.x + '%';
            document.getElementById('editor-y-val').textContent = editorState.y + '%';
            
            zoomSlider.value = editorState.zoom;
            xSlider.value = editorState.x;
            ySlider.value = editorState.y;
        }

        zoomSlider.addEventListener('input', (e) => {
            editorState.zoom = parseFloat(e.target.value);
            applyEditorState();
        });
        xSlider.addEventListener('input', (e) => {
            editorState.x = parseInt(e.target.value);
            applyEditorState();
        });
        ySlider.addEventListener('input', (e) => {
            editorState.y = parseInt(e.target.value);
            applyEditorState();
        });

        // Drag functionality
        previewContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startPos = { x: e.clientX, y: e.clientY };
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const dx = e.clientX - startPos.x;
            const dy = e.clientY - startPos.y;
            
            const sensitivityX = 0.2 / editorState.zoom;
            const sensitivityY = 0.2 / editorState.zoom;
            
            editorState.x = Math.max(0, Math.min(100, editorState.x - (dx * sensitivityX)));
            editorState.y = Math.max(0, Math.min(100, editorState.y - (dy * sensitivityY)));
            
            startPos = { x: e.clientX, y: e.clientY };
            applyEditorState();
        });
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch support for drag
        previewContainer.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                isDragging = true;
                startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, {passive: true});
        document.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length === 0) return;
            
            const dx = e.touches[0].clientX - startPos.x;
            const dy = e.touches[0].clientY - startPos.y;
            
            const sensitivityX = 0.2 / editorState.zoom;
            const sensitivityY = 0.2 / editorState.zoom;
            
            editorState.x = Math.max(0, Math.min(100, editorState.x - (dx * sensitivityX)));
            editorState.y = Math.max(0, Math.min(100, editorState.y - (dy * sensitivityY)));
            
            startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            applyEditorState();
        }, {passive: true});
        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        function resetEditor() {
            editorState = { x: 50, y: 50, zoom: 1 };
            applyEditorState();
        }

        // Export globals for inline event handlers
        window.checkPassword = checkPassword;
        window.logout = logout;
        window.saveProduct = saveProduct;
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.resetForm = resetForm;
        window.updatePreviewLocal = updatePreviewLocal;
        window.resetEditor = resetEditor;

    </script>
</body>
</html>
