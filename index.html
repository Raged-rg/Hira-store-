<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيرة | Hira</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="Images/logo.jpg">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-right">
            <a href="index.html" class="logo" style="text-decoration:none;">
                <h1 style="display: flex; align-items: center; gap: 10px;">
                    <img src="Images/logo.jpg" alt="Logo" style="max-height: 40px; border-radius: 5px;">
                    <span class="brand-font-ar" style="color:var(--black);">حــــيرة</span>
                </h1>
            </a>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
                <i class="fa fa-search"></i>
            </div>
        </div>
        <div class="header-left" style="display: flex; gap: 15px; align-items: center;">
            <button id="fav-btn" class="cart-icon-btn" onclick="openFavModal()">
                <i class="fa fa-heart"></i>
                <span id="fav-badge" class="cart-badge" style="background-color: var(--matte-gold);">0</span>
            </button>
            <button id="cart-btn" class="cart-icon-btn" onclick="openCartModal()">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-badge" class="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2 style="font-family: 'Amiri', serif; font-size: 64px; font-weight: 700; margin-bottom: 20px;">الأناقة في
                بساطتها</h2>
            <p style="font-family: 'Amiri', serif; font-size: 26px; color: #444;">اكتشفي مجموعة عبايات حيرة الفاخرة</p>
        </div>
    </section>

    <!-- Products Main Container -->
    <main class="container">


        <!-- Dynamic Product Grid -->
        <div id="global-loader" style="text-align: center; padding: 50px 0;">
            <div class="loader" style="margin: 0 auto;"></div>
            <p style="margin-top: 15px; color: var(--matte-gold);">جاري تحميل المنتجات...</p>
        </div>
        <div id="product-grid" class="grid"></div>
    </main>

    <!-- Firebase and Main Scripts -->
    <script src="script.js"></script>
    <script type="module">
        import { db, collection, getDocs } from './firebase-config.js';
        
        async function fetchProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                window.hiraProducts = [];
                querySnapshot.forEach((doc) => {
                    window.hiraProducts.push({ id: doc.id, ...doc.data() });
                });
            } catch (e) {
                console.error("Error fetching products: ", e);
                const grid = document.getElementById('product-grid');
                if (grid) grid.innerHTML = '<div style="text-align:center; padding:40px; color:red; grid-column:1/-1;">خطأ في تحميل المنتجات. تأكد من اتصالك بالإنترنت.</div>';
            } finally {
                const loader = document.getElementById('global-loader');
                if(loader) loader.style.display = 'none';
                window.initPage();
            }
        }

        fetchProducts();
    </script>
</body>
</html>
