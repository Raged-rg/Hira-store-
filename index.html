<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيرة | Hira</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="Images/logo.jpg">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-right">
            <img src="Images/logo.jpg" alt="Logo" style="max-height: 60px; border-radius: 5px;">
        </div>
        <div class="header-center">
            <a href="index.html" class="logo">
                <h1><span class="brand-font-ar">حــــيرة</span> <span
                        style="color: var(--matte-gold); margin: 0 10px;">|</span> <span class="brand-font">Hira</span>
                </h1>
            </a>
        </div>
        <div class="header-left">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
                <i class="fa fa-search"></i>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2 style="font-family: 'Amiri', serif; font-size: 64px; font-weight: 700; margin-bottom: 20px;">الأناقة في
                بساطتها</h2>
            <p style="font-family: 'Amiri', serif; font-size: 26px; color: #444;">اكتشفي مجموعة عبايات حيرة الفاخرة</p>
        </div>
    </section>

    <!-- Products Main Container -->
    <main class="container">


        <!-- Dynamic Product Grid -->
        <div id="product-grid" class="grid"></div>
    </main>

    <!-- Local Database -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
