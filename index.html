<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>حيرة | Hira</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/5gZd96b3/logo.jpg">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hira-abaya.web.app/">
    <meta property="og:title" content="حيرة | Hira">
    <meta property="og:description" content="اكتشفي مجموعة عبايات حيرة الفاخرة - الأناقة في بساطتها">
    <meta property="og:image" itemprop="image" content="https://i.ibb.co/5gZd96b3/logo.jpg">
    <meta property="og:image:secure_url" content="https://i.ibb.co/5gZd96b3/logo.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <!-- Apple Touch Icon for iOS -->
    <link rel="apple-touch-icon" href="https://i.ibb.co/5gZd96b3/logo.jpg">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://hira-abaya.web.app/">
    <meta name="twitter:title" content="حيرة | Hira">
    <meta name="twitter:description" content="اكتشفي مجموعة عبايات حيرة الفاخرة - الأناقة في بساطتها">
    <meta name="twitter:image" content="https://i.ibb.co/5gZd96b3/logo.jpg">
</head>

<body>

    <header>
        <div class="header-right">
            <a href="index.html" class="logo" style="text-decoration:none;">
                <h1>
                    <img src="https://i.ibb.co/5gZd96b3/logo.jpg" alt="Logo" style="max-height: 40px; border-radius: 5px;" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/40x40?text=Logo'; this.onerror=null;">
                    <span class="brand-font-ar" style="color: #D6C2A8; text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.05);">حــــيرة</span>
                </h1>
            </a>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
                <i class="fa fa-search"></i>
            </div>
        </div>
        <div class="header-left">
            <button id="fav-btn" class="cart-icon-btn" onclick="openFavModal()">
                <i class="fa fa-heart"></i>
                <span class="fav-badge">0</span>
            </button>
            <button id="cart-btn" class="cart-icon-btn" onclick="openCartModal()">
                <i class="fa fa-shopping-cart"></i>
                <span class="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2 style="font-family: 'Amiri', serif; font-size: 64px; font-weight: 700; margin-bottom: 20px;">الأناقة في
                بساطتها</h2>
            <p style="font-family: 'Amiri', serif; font-size: 26px; color: #444;">اكتشفي مجموعة عبايات حيرة الفاخرة</p>
        </div>
    </section>

    <!-- Products Main Container -->
    <main class="container">
        <!-- Price Filter Section -->
        <div class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="renderProducts(window.hiraProducts)">الكل</button>
                <button class="filter-btn" onclick="filterByPrice(0, 25000)">أقل من 25,000 د.ع</button>
                <button class="filter-btn" onclick="filterByPrice(25000, 50000)">25,000 - 50,000</button>
                <button class="filter-btn" onclick="filterByPrice(50000, 100000)">50,000 - 100,000</button>
                <button class="filter-btn" onclick="filterByPrice(100000)">100,000+</button>
            </div>
        </div>


        <!-- Dynamic Product Grid -->
        <div id="global-loader" style="text-align: center; padding: 50px 0;">
            <div class="loader" style="margin: 0 auto;"></div>
            <p style="margin-top: 15px; color: var(--matte-gold);">جاري تحميل المنتجات...</p>
        </div>
        <div id="product-grid" class="grid"></div>
    </main>

    <!-- Firebase and Main Scripts -->
    <script src="script.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
