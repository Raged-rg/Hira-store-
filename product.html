<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حيرة | تفاصيل المنتج</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/5gZd96b3/logo.jpg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hira-abaya.web.app/">
    <meta property="og:title" content="حيرة | Hira">
    <meta property="og:description" content="اكتشفي مجموعة عبايات حيرة الفاخرة - الأناقة في بساطتها">
    <meta property="og:image" itemprop="image" content="https://i.ibb.co/5gZd96b3/logo.jpg">
    <meta property="og:image:secure_url" content="https://i.ibb.co/5gZd96b3/logo.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <!-- Apple Touch Icon for iOS -->
    <link rel="apple-touch-icon" href="https://i.ibb.co/5gZd96b3/logo.jpg">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://hira-abaya.web.app/">
    <meta name="twitter:title" content="حيرة | Hira">
    <meta name="twitter:description" content="اكتشفي مجموعة عبايات حيرة الفاخرة - الأناقة في بساطتها">
    <meta name="twitter:image" content="https://i.ibb.co/5gZd96b3/logo.jpg">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-right">
            <a href="index.html" class="logo" style="text-decoration:none;">
                <h1 style="display: flex; align-items: center; gap: 10px;">
                    <img src="https://i.ibb.co/5gZd96b3/logo.jpg" alt="Logo" style="max-height: 40px; border-radius: 5px;">
                    <span class="brand-font-ar" style="color: #D6C2A8;">حــــيرة</span>
                </h1>
            </a>
        </div>
        <div class="header-center">
            <!-- Search not rendered in Product page but keeping the structural div to preserve 3-column auto grid layout -->
        </div>
        <div class="header-left" style="display: flex; gap: 15px; align-items: center;">
            <button id="fav-btn" class="cart-icon-btn" onclick="openFavModal()">
                <i class="fa fa-heart"></i>
                <span id="fav-badge" class="cart-badge" style="background-color: var(--matte-gold);">0</span>
            </button>
            <button id="cart-btn" class="cart-icon-btn" onclick="openCartModal()">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-badge" class="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- Product Detail Container -->
    <main class="container">


        <!-- Dynamic Product Detail -->
        <div id="global-loader" style="text-align: center; padding: 50px 0;">
            <div class="loader" style="margin: 0 auto;"></div>
            <p style="margin-top: 15px; color: var(--matte-gold);">جاري تحميل المنتج...</p>
        </div>
        <div id="product-detail" class="product-detail-container"></div>
    </main>

    <!-- Firebase and Main Scripts -->
    <script src="script.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
